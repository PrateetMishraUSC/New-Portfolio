<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <style>
    .tile { fill: #F6F1E7; }
    .brace { fill: #A4541F; }
    .letter { fill: #1E1A12; }
    @media (prefers-color-scheme: dark) {
      .tile { fill: #171410; }
      .brace { fill: #D9824A; }
      .letter { fill: #EFE8D8; }
    }
  </style>
  <rect class="tile" width="64" height="64" rx="14"/>
  <text x="32" y="46" text-anchor="middle" font-family="'JetBrains Mono','SF Mono','Fira Code','Consolas',monospace" font-weight="700" font-size="34"><tspan class="brace">{</tspan><tspan class="letter">P</tspan><tspan class="brace">}</tspan></text>
</svg>
